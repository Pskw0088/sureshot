<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Channel</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Georgia, serif;
    }

    body{
      background:#f2f2f2;
      text-align:center;
      overflow-x:hidden;
    }

    .container{
      width:100%;
      max-width:430px;
      margin:auto;
      padding:20px 15px 40px;
    }

    .top-title{
      color:#57d6d1;
      font-size:58px;
      margin-top:10px;
      font-weight:500;
    }

    .sub-title{
      color:#57d6d1;
      font-size:48px;
      margin:90px 0 40px;
      font-weight:500;
    }

    .banner{
      width:100%;
      border-radius:40px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .banner img{
      width:100%;
      display:block;
    }

    .join-btn{
      width:100%;
      margin-top:40px;
      background:#20c8cf;
      border-radius:40px;
      padding:18px 10px;
      font-size:34px;
      color:white;
      cursor:pointer;
      box-shadow:0 6px 0 #116b93;
      transition:0.2s;
      display:block;
      text-decoration:none;
      text-align:center;
    }

    .join-btn span{
      display:block;
      font-size:22px;
      margin-top:-5px;
    }

    .join-btn:active{
      transform:translateY(3px);
      box-shadow:0 3px 0 #116b93;
    }

    .timer{
      display:flex;
      justify-content:center;
      gap:35px;
      margin:40px 0;
      color:#57d6d1;
    }

    .time-box h2{
      font-size:42px;
      font-weight:bold;
    }

    .time-box p{
      font-size:18px;
      line-height:1.2;
      letter-spacing:1px;
    }

    .description{
      color:#57d6d1;
      font-size:32px;
      line-height:1.2;
      font-weight:600;
      margin-top:20px;
      padding:0 10px;
    }

    @media(max-width:480px){

      .top-title{
        font-size:42px;
      }

      .sub-title{
        font-size:34px;
      }

      .description{
        font-size:24px;
      }

      .join-btn{
        font-size:28px;
      }

      .time-box h2{
        font-size:32px;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <h1 class="top-title">your sureshot</h1>

    <h2 class="sub-title">only vip channel</h2>

    <div class="banner">
  <img src="https://postimg.cc/625cmYB1/banner.jpg" alt="VIP Banner">
    </div>

    <a href="https://t.me/+YKmXg6fnlg1kNzI1" target="_blank" class="join-btn">
      join
      <span>vip</span>
    </a>

    <div class="timer">

      <div class="time-box">
        <h2>11</h2>
        <p>HOURS</p>
      </div>

      <div class="time-box">
        <h2>14</h2>
        <p>MINUTES</p>
      </div>

      <div class="time-box">
        <h2>59</h2>
        <p>SECONDS</p>
      </div>

    </div>

    <div class="description">
      new game 13l game bhot pasa de ra he jisko vi pasa kamana he join kar lo deaiy 4000-5000 aramse kama paooo gi jisko vi kamana he join kar lo ey channel kuch din publick rahaga
    </div>

  </div>

</body>
</html>
